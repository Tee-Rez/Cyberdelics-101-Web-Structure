<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>External Links Embed</title>

    <!-- GOOGLE FONTS: Font Pairings -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;500&family=Oxanium:wght@400;700&family=Space+Mono&family=Sora:wght@300;600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

    <!-- CORE STYLES -->
    <link rel="stylesheet" href="../core/styles.css">

    <!-- METHOD STYLES (External Links specifically) -->
    <link rel="stylesheet" href="../methods/external-links/external-links.css">

    <style>
        body {
            margin: 0;
            background: #000;
            overflow-x: hidden;
            overflow-y: auto;
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
        }

        #lesson-root {
            width: 100%;
            height: 100%;
            min-height: 100vh;
        }

        /* Loading State Overlay */
        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #000;
            color: #0ff;
            z-index: 9999;
            transition: opacity 0.5s;
        }

        .spinner {
            margin-top: 20px;
            font-size: 0.9em;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <div id="loader">
        <h2>CONNECTING TO NODE...</h2>
        <div class="spinner">Initializing External Links...</div>
    </div>

    <div id="lesson-root"></div>

    <!-- CORE DEPENDENCIES -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="../core/method-base.js"></script>
    <script src="../core/tutorial-overlay.js"></script>
    <script src="../core/method-loader.js"></script>
    <script src="../core/lesson-ui.js"></script>
    <script src="../core/artifact-system.js"></script>
    <script src="../core/course-core.js"></script>
    <script src="../core/state-manager.js"></script>
    <script src="../core/audio-player.js"></script>
    <script src="../core/neural-background.js"></script>

    <!-- METHOD FACTORIES (Only external-links needed here) -->
    <script src="../methods/external-links/external-links.js"></script>

    <!-- THE ENGINE -->
    <script src="../core/lesson-runner.js"></script>

    <!-- UNIFIED LOADER SCRIPT -->
    <script>
        (function () {
            console.log('[External Links Embed] Booting...');

            // 1. Get the source parameter
            const urlParams = new URLSearchParams(window.location.search);
            let markdownPath = urlParams.get('source');

            // Override with a default for testing if not provided
            if (!markdownPath) {
                console.warn('[External Links Embed] No ?source parameter provided, defaulting to placeholder path.');
                markdownPath = "Modules/Module_4_TheLandscape/Lesson_4_SpecializedApplicationsAndHardware/External-Links.md";
            }

            // 2. Build the dynamic manifest
            const manifest = {
                "id": "external_links_embed",
                "title": "External Links",
                "skipOpeningScreen": true,
                "theme": null,
                "modules": [
                    {
                        "id": "links",
                        "title": "Further Exploration",
                        "type": "external-links",
                        "markdownPath": markdownPath
                    }
                ]
            };

            // 3. Initialize Engine
            LessonRunner.init('#lesson-root');

            // 4. Initialize StateManager
            if (window.StateManager) window.StateManager.init();

            // 5. Define Loader Removal
            const removeLoader = () => {
                const loader = document.getElementById('loader');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.remove(), 500);
                }
            };

            // 6. Load the Manifest directly
            setTimeout(() => {
                removeLoader();
                LessonRunner.loadLesson(manifest);
                
                // Hide the lesson progress UI header since this is a standalone embed
                const uiHeader = document.querySelector('.lesson-ui-header');
                if (uiHeader) {
                    uiHeader.style.display = 'none';
                }
            }, 500);

            // 7. Signal readiness to Parent (Framer)
            setTimeout(() => {
                window.parent.postMessage({ type: 'PLAYER_READY' }, '*');
            }, 500);

        })();
    </script>
</body>

</html>
