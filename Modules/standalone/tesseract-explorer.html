<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesseract Explorer Simulation</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;500&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="../../core/styles.css">
    <link rel="stylesheet" href="../../methods/interactive-simulation/interactive-simulation.css">
    <link rel="stylesheet" href="../../methods/interactive-simulation/tesseract-explorer/tesseract-explorer.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        .interactive-simulation-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div class="interactive-simulation-container" data-engine="tesseract-explorer">
        <!-- Simulation engine will inject standard UI here -->
    </div>

    <!-- Core Dependencies -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- Base Methods -->
    <script src="../../core/method-base.js"></script>
    <script src="../../methods/interactive-simulation/interactive-simulation.js"></script>

    <!-- Engine Scripts -->
    <script src="../../methods/interactive-simulation/tesseract-explorer/tesseract-explorer-data.js"></script>
    <script src="../../methods/interactive-simulation/tesseract-explorer/tesseract-explorer.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.querySelector('.interactive-simulation-container');
            const factory = window.InteractiveSimulationFactory;
            
            if (factory) {
                const instance = factory();
                instance.onInit(container, {
                    engine: 'TesseractExplorer',
                    content: { 
                        params: {
                            data: window.TesseractExplorerData 
                        } 
                    },
                    showPlaybackControls: false
                });
            } else {
                console.error("[Standalone] InteractiveSimulationFactory not found.");
            }
        });
    </script>
</body>
</html>
