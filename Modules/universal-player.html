<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberdelics 101 Lesson Player</title>

    <!-- CORE STYLES -->
    <link rel="stylesheet" href="../core/styles.css">

    <!-- METHOD STYLES (Load all potential method styles) -->
    <link rel="stylesheet" href="../methods/progressive-disclosure/progressive-disclosure.css">
    <link rel="stylesheet" href="../methods/scenario-based/scenario-based.css">
    <link rel="stylesheet" href="../methods/interactive-simulation/interactive-simulation.css">
    <link rel="stylesheet" href="../methods/interactive-simulation/engines/node-zoom.css">
    <link rel="stylesheet" href="../methods/interactive-simulation/venn-diagram-combiner/venn-diagram-combiner.css">
    <link rel="stylesheet" href="../methods/interactive-simulation/spectrum-explorer/spectrum-explorer.css">
    <link rel="stylesheet" href="../methods/interactive-simulation/cyberdelic-convergence/cyberdelic-convergence.css">
    <link rel="stylesheet" href="../methods/interactive-simulation/tesseract-explorer/tesseract-explorer.css">
    <link rel="stylesheet" href="../methods/interactive-simulation/cybernetic-loop/cybernetic-loop.css">
    <link rel="stylesheet" href="../methods/option-selector/option-selector.css">
    <link rel="stylesheet" href="../methods/knowledge-construction/knowledge-construction.css">

    <style>
        body {
            margin: 0;
            background: #000;
            overflow: hidden;
            font-family: 'Rajdhani', sans-serif;
        }

        #lesson-root {
            width: 100vw;
            height: 100vh;
        }

        /* Loading State Overlay */
        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #000;
            color: #0ff;
            z-index: 9999;
            transition: opacity 0.5s;
        }

        .spinner {
            margin-top: 20px;
            font-size: 0.9em;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <div id="loader">
        <h2>CONNECTING TO NODE...</h2>
        <div class="spinner">Initializing Neural Interface...</div>
    </div>

    <div id="lesson-root"></div>

    <!-- CORE DEPENDENCIES -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="../core/method-base.js"></script>
    <script src="../core/method-loader.js"></script>
    <script src="../core/lesson-ui.js"></script>
    <script src="../core/artifact-system.js"></script>
    <script src="../core/course-core.js"></script>
    <script src="../core/state-manager.js"></script>
    <script src="../core/audio-player.js"></script>
    <script src="../core/neural-background.js"></script>

    <!-- METHOD FACTORIES -->
    <script src="../methods/progressive-disclosure/progressive-disclosure.js"></script>
    <script src="../methods/scenario-based/scenario-based.js"></script>
    <script src="../methods/interactive-simulation/interactive-simulation.js"></script>
    <script src="../methods/interactive-simulation/venn-diagram-combiner/venn-diagram-combiner.js"></script>
    <script src="../methods/interactive-simulation/spectrum-explorer/spectrum-explorer.js"></script>
    <script src="../methods/interactive-simulation/cyberdelic-convergence/cyberdelic-data.js"></script>
    <script src="../methods/interactive-simulation/cyberdelic-convergence/cyberdelic-convergence.js"></script>
    <script src="../methods/interactive-simulation/tesseract-explorer/tesseract-explorer-data.js"></script>
    <script src="../methods/interactive-simulation/tesseract-explorer/tesseract-explorer.js"></script>
    <script src="../methods/interactive-simulation/cybernetic-loop/cybernetic-loop-data.js"></script>
    <script src="../methods/interactive-simulation/cybernetic-loop/cybernetic-loop.js"></script>
    <script src="../methods/option-selector/option-selector.js"></script>
    <script src="../methods/knowledge-construction/knowledge-construction.js"></script>

    <!-- THE ENGINE -->
    <script src="../core/lesson-runner.js"></script>

    <!-- UNIFIED LOADER SCRIPT -->
    <script>
        (function () {
            console.log('[Player] Booting... Waiting for manifest injection or local test-manifest.json');

            // 1. Initialize Engine
            LessonRunner.init('#lesson-root');

            // 2. Initialize StateManager
            if (window.StateManager) window.StateManager.init();

            let manifestLoaded = false;

            // 3. Define Loader Removal
            const removeLoader = () => {
                const loader = document.getElementById('loader');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.remove(), 500);
                }
            };

            // 4. Handle Manifest Loading
            const loadManifest = (manifest, source) => {
                if (manifestLoaded) return;
                manifestLoaded = true;
                console.log(`[Player] Manifest received via ${source}!`);

                try {
                    if (typeof manifest === 'string') manifest = JSON.parse(manifest);
                    removeLoader();
                    LessonRunner.loadLesson(manifest);
                } catch (e) {
                    console.error(`[Player] Failed to load manifest from ${source}:`, e);
                    const loader = document.getElementById('loader');
                    if (loader) {
                        loader.innerHTML = `<h2 style="color:red">ERROR LOADING MANIFEST</h2><pre>${e.message}</pre>`;
                    }
                }
            };

            // 5. Listen for Framer Messages
            window.addEventListener('message', (event) => {
                const msg = event.data;
                if (msg && msg.type === 'LOAD_MANIFEST') {
                    loadManifest(msg.manifest, 'Framer Message');
                }
            });

            // 6. Signal readiness to Parent (Framer)
            setTimeout(() => {
                window.parent.postMessage({ type: 'PLAYER_READY' }, '*');
            }, 500);

        })();
    </script>
</body>

</html>
