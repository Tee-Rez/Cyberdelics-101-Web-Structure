    <style>
        body {
            margin: 0;
            background: #000;
            overflow: hidden;
            font-family: 'Rajdhani', sans-serif;
        }

        #lesson-root {
            width: 100vw;
            height: 100vh;
        }

        /* Loading State Overlay */
        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #03010f; /* Deep cyberdelic backplate */
            color: #0ff;
            z-index: 9999;
            transition: opacity 0.8s ease-in-out;
            font-family: 'Orbitron', 'Rajdhani', sans-serif;
        }

        .loader-title {
            font-size: 1.5rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 2rem;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
            animation: pulse-text 2s infinite ease-in-out;
            text-align: center;
        }

        .cyber-loading-bar {
            width: 320px;
            max-width: 80vw;
            height: 4px;
            background: rgba(0, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            border-radius: 2px;
            margin-bottom: 1.5rem;
        }

        .cyber-loading-fill {
            height: 100%;
            width: 0%;
            background: #00c9a7; /* Accent color */
            box-shadow: 0 0 10px #00c9a7, 0 0 20px #00c9a7;
            animation: load-fill 1.8s cubic-bezier(0.65, 0, 0.35, 1) infinite;
        }

        .spinner {
            font-size: 0.8em;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.5;
            animation: pulse-text 2s infinite ease-in-out reverse;
        }

        @keyframes load-fill {
            0% { width: 0%; transform: translateX(0%); }
            50% { width: 100%; transform: translateX(0%); }
            100% { width: 100%; transform: translateX(100%); }
        }
        
        @keyframes pulse-text {
            0%, 100% { opacity: 0.6; text-shadow: 0 0 8px rgba(0,255,255,0.3); }
            50% { opacity: 1; text-shadow: 0 0 15px rgba(0,255,255,0.8); }
        }
    </style>
</head>

<body>

    <div id="loader">
        <h2 class="loader-title">Cyberdelic Lesson initializing</h2>
        <div class="cyber-loading-bar">
            <div class="cyber-loading-fill"></div>
        </div>
        <div class="spinner">Synchronizing Protocols...</div>
    </div>

    <div id="lesson-root"></div>

    <!-- THE ENGINE -->
    <script src="../core/lesson-runner.js"></script>

    <!-- UNIFIED LOADER SCRIPT -->
    <script>
        (function () {
            console.log('[Player] Booting... Waiting for manifest injection or local test-manifest.json');

            // 1. Initialize Engine
            LessonRunner.init('#lesson-root');

            // 2. Initialize StateManager
            if (window.StateManager) window.StateManager.init();

            let manifestLoaded = false;

            // 3. Define Loader Removal
            const removeLoader = () => {
                const loader = document.getElementById('loader');
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.remove(), 500);
                }
            };

            // 4. Handle Manifest Loading
            const loadManifest = (manifest, source) => {
                if (manifestLoaded) return;
                manifestLoaded = true;
                console.log(`[Player] Manifest received via ${source}!`);

                try {
                    if (typeof manifest === 'string') manifest = JSON.parse(manifest);
                    removeLoader();
                    LessonRunner.loadLesson(manifest);
                } catch (e) {
                    console.error(`[Player] Failed to load manifest from ${source}:`, e);
                    const loader = document.getElementById('loader');
                    if (loader) {
                        loader.innerHTML = `<h2 style="color:red">ERROR LOADING MANIFEST</h2><pre>${e.message}</pre>`;
                    }
                }
            };

            // 5. Listen for Framer Messages
            window.addEventListener('message', (event) => {
                const msg = event.data;
                if (msg && msg.type === 'LOAD_MANIFEST') {
                    loadManifest(msg.manifest, 'Framer Message');
                }
            });

            // 6. Signal readiness to Parent (Framer)
            setTimeout(() => {
                window.parent.postMessage({ type: 'PLAYER_READY' }, '*');
            }, 500);

            // 7. Try Local Fetch (for Test Harness)
            fetch('./test-manifest.json')
                .then(response => {
                    if (response.ok) return response.json();
                })
                .then(manifest => {
                    if (manifest) {
                        loadManifest(manifest, 'Local Fetch');
                    }
                })
                .catch(() => {
                    // Ignore fetch errors - we might be in Framer where this file doesn't exist
                });

        })();
    </script>
</body>
