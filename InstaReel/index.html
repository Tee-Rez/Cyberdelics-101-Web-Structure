<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberdelics 101 - InstaReel</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Audiowide&family=Bungee&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Instrument+Serif:ital@0;1&family=Inter:wght@100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Monoton&family=Orbitron:wght@400..900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&family=Space+Grotesk:wght@300..700&family=Syncopate:wght@400;700&family=Unica+One&family=VT323&display=swap" rel="stylesheet">

    <!-- React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel for in-browser JSX parsing -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* Prevent body scroll if DesignCanvas handles it */
        }
        
        #root {
            width: 100vw;
            height: 100vh;
        }

        /* Floating toggle button for Tweaks Panel */
        #tweaks-toggle {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 56px;
            height: 56px;
            border-radius: 28px;
            background: linear-gradient(135deg, #b28aff, #e85cf5);
            border: none;
            box-shadow: 0 4px 16px rgba(232, 92, 245, 0.4);
            color: #fff;
            cursor: pointer;
            z-index: 2147483647; /* Always on top */
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #tweaks-toggle:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 24px rgba(232, 92, 245, 0.6);
        }

        #tweaks-toggle svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Scripts - Load order matters based on dependencies -->
    <script type="text/babel" src="Components/reel-primitives.jsx"></script>
    <script type="text/babel" src="Components/reel-themes.jsx"></script>
    <script type="text/babel" src="Components/reel-backgrounds.jsx"></script>
    <script type="text/babel" src="Components/reel-variant-b.jsx"></script>
    <script type="text/babel" src="Components/reel-player.jsx"></script>
    <script type="text/babel" src="Components/tweaks-panel.jsx"></script>
    <script type="text/babel" src="Components/design-canvas.jsx"></script>
    <script type="text/babel" src="Components/ios-frame.jsx"></script>
    <script type="text/babel" src="Components/app.jsx"></script>

    <!-- Tweaks Panel Toggle Logic -->
    <button id="tweaks-toggle" aria-label="Toggle Tweaks Panel">
        <svg viewBox="0 0 24 24">
            <path d="M12 20V10M18 20V4M6 20v-4M6 12V4M12 6V4M18 16v-4"/>
            <circle cx="6" cy="14" r="2"/>
            <circle cx="12" cy="8" r="2"/>
            <circle cx="18" cy="18" r="2"/>
        </svg>
    </button>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const toggleBtn = document.getElementById('tweaks-toggle');
            let isTweaksOpen = false;

            // Listen for the TweaksPanel mounting and announcing it's available
            window.addEventListener('message', (e) => {
                if (e.data?.type === '__edit_mode_available') {
                    // Open it automatically on load, or let the user click the button
                    // window.postMessage({ type: '__activate_edit_mode' }, '*');
                    // isTweaksOpen = true;
                } else if (e.data?.type === '__edit_mode_dismissed') {
                    // Panel was closed via its own 'X' button
                    isTweaksOpen = false;
                    window.postMessage({ type: '__deactivate_edit_mode' }, '*');
                }
            });

            toggleBtn.addEventListener('click', () => {
                isTweaksOpen = !isTweaksOpen;
                if (isTweaksOpen) {
                    window.postMessage({ type: '__activate_edit_mode' }, '*');
                } else {
                    window.postMessage({ type: '__deactivate_edit_mode' }, '*');
                }
            });
        });
    </script>
</body>
</html>
