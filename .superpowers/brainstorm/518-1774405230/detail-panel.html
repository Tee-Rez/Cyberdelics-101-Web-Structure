<h2>Section 3 — Detail Panel (Node Selected State)</h2>
<p class="subtitle">What the student sees after clicking a node. Click any node name below to preview its panel.</p>

<div style="display:flex; gap:20px; margin-top:20px; flex-wrap:wrap;">

  <!-- Mini network (left) with clickable node buttons -->
  <div style="flex:0 0 160px;">
    <div style="color:#64748b; font-size:10px; letter-spacing:1px; margin-bottom:10px;">SELECT A NODE</div>
    <div style="display:flex; flex-direction:column; gap:6px;" id="node-buttons">
      <button onclick="showPanel('tech')"     style="background:#0f1929;border:1.5px solid #06b6d4;color:#06b6d4;padding:6px 10px;border-radius:6px;font-size:10px;font-family:monospace;cursor:pointer;text-align:left;">① TECH PROVIDERS</button>
      <button onclick="showPanel('knowledge')" style="background:#0f1929;border:1.5px solid #6366f1;color:#6366f1;padding:6px 10px;border-radius:6px;font-size:10px;font-family:monospace;cursor:pointer;text-align:left;">② KNOWLEDGE PROD.</button>
      <button onclick="showPanel('clinical')"  style="background:#0f1929;border:1.5px solid #a855f7;color:#a855f7;padding:6px 10px;border-radius:6px;font-size:10px;font-family:monospace;cursor:pointer;text-align:left;">③ CLINICAL PRACTICE</button>
      <button onclick="showPanel('facilitators')" style="background:#0f1929;border:1.5px solid #ec4899;color:#ec4899;padding:6px 10px;border-radius:6px;font-size:10px;font-family:monospace;cursor:pointer;text-align:left;">④ FACILITATORS</button>
      <button onclick="showPanel('users')"    style="background:#0f1929;border:1.5px solid #f59e0b;color:#f59e0b;padding:6px 10px;border-radius:6px;font-size:10px;font-family:monospace;cursor:pointer;text-align:left;">⑤ USERS & COMM.</button>
      <button onclick="showPanel('economic')" style="background:#0f1929;border:1.5px solid #f97316;color:#f97316;padding:6px 10px;border-radius:6px;font-size:10px;font-family:monospace;cursor:pointer;text-align:left;">⑥ ECONOMIC INFRA</button>
      <button onclick="showPanel('regulatory')" style="background:#0f1929;border:1.5px solid #10b981;color:#10b981;padding:6px 10px;border-radius:6px;font-size:10px;font-family:monospace;cursor:pointer;text-align:left;">⑦ REGULATORY</button>
      <button onclick="showPanel('educators')" style="background:#0f1929;border:1.5px solid #e879f9;color:#e879f9;padding:6px 10px;border-radius:6px;font-size:10px;font-family:monospace;cursor:pointer;text-align:left;">⑧ EDUCATORS</button>
    </div>
    <div style="margin-top:12px; background:#1e293b; border-radius:6px; padding:8px;">
      <div style="color:#475569; font-size:10px; margin-bottom:4px;">PROGRESS</div>
      <div style="color:#64748b; font-size:10px;">0 / 8 visited</div>
      <div style="background:#0f172a; border-radius:3px; height:4px; margin-top:4px;"><div id="progress-bar" style="background:#06b6d4;height:4px;border-radius:3px;width:0%;transition:width 0.4s;"></div></div>
    </div>
  </div>

  <!-- Detail panel (right) -->
  <div style="flex:1; min-width:280px;">
    <div id="panel-empty" style="background:#0a1628; border:1px dashed #1e3a5f; border-radius:10px; padding:30px; text-align:center; color:#334155; font-size:12px; min-height:340px; display:flex; align-items:center; justify-content:center;">
      ← Select a node to see its detail panel
    </div>

    <div id="detail-panel" style="display:none; background:#0a1628; border:1px solid var(--node-color, #06b6d4); border-radius:10px; overflow:hidden; min-height:340px;">

      <!-- Panel header -->
      <div id="panel-header" style="padding:14px 16px; border-bottom:1px solid #1e293b; display:flex; align-items:center; gap:12px;">
        <div id="panel-dot" style="width:12px;height:12px;border-radius:50%;background:var(--node-color,#06b6d4);flex-shrink:0;box-shadow:0 0 8px var(--node-color,#06b6d4);"></div>
        <div>
          <div id="panel-title" style="color:var(--node-color,#06b6d4);font-family:monospace;font-size:13px;font-weight:bold;letter-spacing:1px;"></div>
          <div id="panel-subtitle" style="color:#475569;font-size:10px;margin-top:2px;"></div>
        </div>
        <div id="visited-badge" style="margin-left:auto;background:rgba(52,211,153,0.15);border:1px solid #34d399;color:#34d399;font-size:9px;padding:3px 8px;border-radius:4px;display:none;">✓ VISITED</div>
      </div>

      <!-- Panel body -->
      <div style="padding:14px 16px; display:grid; grid-template-columns:1fr 1fr; gap:14px;">

        <!-- Left col: Role + Key Players -->
        <div>
          <div style="color:#475569;font-size:10px;letter-spacing:1px;margin-bottom:6px;">ROLE IN ECOSYSTEM</div>
          <div id="panel-role" style="color:#94a3b8;font-size:11px;line-height:1.6;margin-bottom:14px;"></div>

          <div style="color:#475569;font-size:10px;letter-spacing:1px;margin-bottom:6px;">KEY PLAYERS</div>
          <div id="panel-players" style="display:flex;flex-wrap:wrap;gap:5px;"></div>
        </div>

        <!-- Right col: Health indicators + Ripple -->
        <div>
          <div style="color:#475569;font-size:10px;letter-spacing:1px;margin-bottom:8px;">ECOSYSTEM HEALTH 2024</div>
          <div id="panel-health" style="display:flex;flex-direction:column;gap:6px;margin-bottom:14px;"></div>

          <div style="color:#475569;font-size:10px;letter-spacing:1px;margin-bottom:6px;">CONNECTS TO</div>
          <div id="panel-connections" style="display:flex;flex-wrap:wrap;gap:5px;"></div>
        </div>

      </div>

      <!-- Ripple fact footer -->
      <div style="padding:10px 16px; border-top:1px solid #1e293b; background:#060d1a;">
        <div id="panel-ripple" style="color:#94a3b8;font-size:11px;line-height:1.5;"></div>
      </div>

    </div>
  </div>

</div>

<script>
const nodes = {
  tech: {
    color: '#06b6d4', title: 'TECHNOLOGY PROVIDERS', subtitle: 'Hardware Manufacturers · Software Developers · Open Source',
    role: 'Build the tools the field runs on. Hardware defines the capability ceiling; software determines what experiences are possible within it.',
    players: ['Meta Quest', 'Apple Vision Pro', 'Pico', 'Tripp', 'Healium', 'OpenXR'],
    health: [
      { label: 'Hardware Capability', value: 72, color: '#06b6d4' },
      { label: 'Ecosystem Reach', value: 85, color: '#06b6d4' },
      { label: 'Developer Support', value: 60, color: '#06b6d4' },
    ],
    connections: ['② Knowledge', '⑥ Economic', '⑦ Regulatory'],
    ripple: '⚡ A new headset spec ripples outward — developers update platforms, researchers design new studies, practitioners evaluate adoption.'
  },
  knowledge: {
    color: '#6366f1', title: 'KNOWLEDGE PRODUCERS', subtitle: 'Research Institutions · Academics · Publication Networks',
    role: 'Validate effectiveness and establish safety standards. Their findings give clinical practitioners and investors the confidence to act.',
    players: ['Stanford VHIL', 'Imperial College', 'Yale', 'Johns Hopkins', 'Monash', 'Univ. Barcelona'],
    health: [
      { label: 'Research Volume', value: 75, color: '#6366f1' },
      { label: 'Funding Access', value: 45, color: '#6366f1' },
      { label: 'Global Collaboration', value: 62, color: '#6366f1' },
    ],
    connections: ['③ Clinical', '① Tech', '⑥ Economic', '⑦ Regulatory'],
    ripple: '⚡ One peer-reviewed study can shift investor sentiment, update facilitator training curricula, and open regulatory pathways simultaneously.'
  },
  clinical: {
    color: '#a855f7', title: 'CLINICAL PRACTICE', subtitle: 'Therapists · Psychiatrists · Pain Specialists · Healthcare Systems',
    role: 'Bring VR tools into real patient care. Their adoption signals to insurers, investors, and regulators that the technology has genuine therapeutic value.',
    players: ['RelieVRx', 'XRHealth', 'Oxford VR', 'AppliedVR', 'Psious'],
    health: [
      { label: 'Clinical Adoption', value: 38, color: '#a855f7' },
      { label: 'Insurance Coverage', value: 22, color: '#a855f7' },
      { label: 'Protocol Development', value: 55, color: '#a855f7' },
    ],
    connections: ['② Knowledge', '④ Facilitators', '⑥ Economic', '⑦ Regulatory'],
    ripple: '⚡ FDA clearance for a VR therapy device (like RelieVRx) immediately signals insurers, attracts investment, and elevates the entire field\'s credibility.'
  },
  facilitators: {
    color: '#ec4899', title: 'FACILITATORS & GUIDES', subtitle: 'Wellness Practitioners · Transformational Guides · Retreat Leaders',
    role: 'Guide experiences in non-clinical wellness and transformational contexts. They are the field\'s primary point of contact with most users.',
    players: ['VRAR Association', 'Multiversity', 'Synthesis', 'Individual practitioners'],
    health: [
      { label: 'Training Infrastructure', value: 42, color: '#ec4899' },
      { label: 'Professional Standards', value: 30, color: '#ec4899' },
      { label: 'Community Size', value: 58, color: '#ec4899' },
    ],
    connections: ['③ Clinical', '⑤ Users', '⑧ Educators'],
    ripple: '⚡ As facilitator training programs mature and ethics standards emerge, the pathway from curious user to credentialed guide becomes clearer for the whole field.'
  },
  users: {
    color: '#f59e0b', title: 'USERS & COMMUNITIES', subtitle: 'Personal Practitioners · Peer Networks · Early Adopters',
    role: 'Generate real-world feedback and cultural momentum. Their experiences validate or challenge what researchers and developers believe is possible.',
    players: ['Reddit r/VRtoER', 'Discord communities', 'Meetup groups', 'Early adopter networks'],
    health: [
      { label: 'Community Activity', value: 65, color: '#f59e0b' },
      { label: 'Feedback Quality', value: 50, color: '#f59e0b' },
      { label: 'Diversity of Users', value: 28, color: '#f59e0b' },
    ],
    connections: ['④ Facilitators', '② Knowledge', '① Tech'],
    ripple: '⚡ User communities surface real-world effects (positive and adverse) that researchers haven\'t yet studied — feeding directly back into the knowledge production cycle.'
  },
  economic: {
    color: '#f97316', title: 'ECONOMIC INFRASTRUCTURE', subtitle: 'Venture Capital · Angels · Grants · Business Models',
    role: 'Determine which ideas get resources to develop. Every platform, research program, and training organization depends on some form of economic model to survive.',
    players: ['SOSV', 'XRC Labs', 'NIH Grants', 'Wellcome Trust', 'Bootstrap studios'],
    health: [
      { label: 'VC Investment', value: 48, color: '#f97316' },
      { label: 'Grant Availability', value: 55, color: '#f97316' },
      { label: 'Reimbursement Access', value: 20, color: '#f97316' },
    ],
    connections: ['① Tech', '② Knowledge', '③ Clinical', '⑦ Regulatory'],
    ripple: '⚡ When insurance reimbursement expands (even one HCPCS code), it unlocks a scalable revenue model that VC and clinical investment follows rapidly.'
  },
  regulatory: {
    color: '#10b981', title: 'REGULATORY & KNOWLEDGE SHARING', subtitle: 'FDA · EU MDR · Professional Associations · Publications · Conferences',
    role: 'Enable safe practice and information flow. Without regulatory frameworks, clinical tools can\'t reach patients. Without knowledge sharing, insights stay siloed.',
    players: ['FDA', 'EU MDR', 'UKCA', 'IVRHA', 'JMIR', 'IEEE VR'],
    health: [
      { label: 'Regulatory Clarity', value: 35, color: '#10b981' },
      { label: 'Knowledge Circulation', value: 68, color: '#10b981' },
      { label: 'International Harmonization', value: 25, color: '#10b981' },
    ],
    connections: ['① Tech', '② Knowledge', '③ Clinical', '⑥ Economic'],
    ripple: '⚡ A clear FDA device classification pathway removes uncertainty for developers and investors simultaneously — one regulatory decision unblocks multiple ecosystem components.'
  },
  educators: {
    color: '#e879f9', title: 'EDUCATORS & TRAINERS', subtitle: 'Training Programs · Certification Bodies · Academic Curricula',
    role: 'Build professional competency across the field. They translate research and clinical evidence into practitioner-ready skills and standards.',
    players: ['VRAR Association', 'Multiversity', 'University programs', 'Online platforms'],
    health: [
      { label: 'Program Availability', value: 40, color: '#e879f9' },
      { label: 'Curriculum Quality', value: 52, color: '#e879f9' },
      { label: 'Certification Standards', value: 28, color: '#e879f9' },
    ],
    connections: ['④ Facilitators', '③ Clinical', '② Knowledge', '⑤ Users'],
    ripple: '⚡ Standardized training raises the quality floor across facilitators and clinicians — protecting users and making the field legible to regulators and insurers.'
  }
};

const visited = new Set();
function showPanel(id) {
  const n = nodes[id];
  document.getElementById('panel-empty').style.display = 'none';
  const panel = document.getElementById('detail-panel');
  panel.style.display = 'block';
  panel.style.setProperty('--node-color', n.color);
  panel.style.borderColor = n.color;
  document.getElementById('panel-dot').style.background = n.color;
  document.getElementById('panel-dot').style.boxShadow = `0 0 8px ${n.color}`;
  document.getElementById('panel-title').style.color = n.color;
  document.getElementById('panel-title').textContent = n.title;
  document.getElementById('panel-subtitle').textContent = n.subtitle;
  document.getElementById('panel-role').textContent = n.role;
  document.getElementById('panel-ripple').innerHTML = `<span style="color:${n.color}">${n.ripple}</span>`;

  const playersEl = document.getElementById('panel-players');
  playersEl.innerHTML = n.players.map(p => `<span style="background:#1e293b;border:1px solid #334155;color:#94a3b8;padding:3px 7px;border-radius:4px;font-size:10px;">${p}</span>`).join('');

  const healthEl = document.getElementById('panel-health');
  healthEl.innerHTML = n.health.map(h => `
    <div>
      <div style="color:#64748b;font-size:9px;margin-bottom:2px;">${h.label}</div>
      <div style="background:#0f172a;border-radius:3px;height:5px;"><div style="background:${h.color};height:5px;border-radius:3px;width:${h.value}%;transition:width 0.6s;"></div></div>
    </div>`).join('');

  const connEl = document.getElementById('panel-connections');
  connEl.innerHTML = n.connections.map(c => `<span style="background:#1e293b;border:1px solid #334155;color:#94a3b8;padding:3px 7px;border-radius:4px;font-size:10px;">${c}</span>`).join('');

  visited.add(id);
  document.getElementById('visited-badge').style.display = 'flex';
  document.getElementById('progress-bar').style.width = `${(visited.size/8)*100}%`;
}
</script>
