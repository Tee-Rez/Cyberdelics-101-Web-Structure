<script>
const nodes = {
  tech: {
    color:'#06b6d4',
    title:'TECHNOLOGY PROVIDERS',

    players:['Meta Quest (77% market share)','Apple Vision Pro','Pico / ByteDance','TRIPP','Healium','Guided Meditation VR','Supernatural','SoundSelf'],
    connections:['② Knowledge','⑥ Economic','⑦ Regulatory'],
    challenge:'Headsets weigh 500–650g, last 2–3 hours, and cause motion sickness in 10–30% of users. Content built for Meta Quest doesn\'t run on Vision Pro or Pico — fragmentation multiplies developer costs and breaks research replication. Platform closures cascade: TRIPP\'s consumer division shutdown disrupted 85,000 subscribers and multiple university research partnerships simultaneously.',
    opportunity:'Sub-400g headsets, 4K per-eye resolution, and $199 price points are 2–3 years out. Eye-tracking (standard on newer headsets) opens new biofeedback channels. AI-personalized real-time environments are emerging as a distinct capability layer.',
    ripple:'⚡ Every hardware spec decision — battery life, tracking precision, price point — ripples to developers, researchers, practitioners, and investors. The field\'s capability ceiling is set here.'
  },
  knowledge: {
    color:'#6366f1',
    title:'KNOWLEDGE PRODUCERS',
    subtitle:'Research Institutions · Academics · Publication Networks',
    role:'Validate effectiveness and establish safety. Their peer-reviewed findings are the credibility infrastructure the entire ecosystem depends on — giving clinical practitioners, investors, and regulators the evidence base to act.',
    players:['Stanford VHIL (100+ papers)','Imperial College London (Carhart-Harris)','Univ. Barcelona EVENT Lab (Mel Slater)','Johns Hopkins (MEQ)','Catholic Univ. Milan (Riva 2025)','Monash University'],
    connections:['③ Clinical','① Tech','⑥ Economic','⑦ Regulatory'],
    challenge:'The research pipeline takes 2–5 years from hypothesis to publication. Nearly all current studies measure outcomes at 1–4 weeks — no one has asked "does this last?" systematically. The evidence base is overwhelmingly WEIRD (Western, Educated, Industrialized, Rich, Democratic), misrepresenting the populations who may most benefit.',
    opportunity:'Riva\'s 2025 study (Dialogues in Clinical Neuroscience) demonstrated cyberdelic VR produces effects comparable to LSD and psilocybin at therapeutic doses — the highest-credibility validation yet. 5-year outcome studies would answer every serious clinician\'s key question and accelerate insurance reimbursement.',
    ripple:'⚡ A single landmark study can shift investor sentiment, update facilitator training curricula, open regulatory pathways, and reshape developer priorities simultaneously.'
  },
  clinical: {
    color:'#a855f7',
    title:'CLINICAL PRACTICE',
    subtitle:'Therapists · Psychiatrists · Pain Specialists · Healthcare Systems',
    role:'Translate research into real patient care. Psychologists, OTs, psychiatrists, and palliative care providers are already using VR for anxiety, PTSD, chronic pain, and end-of-life work. Their adoption signals to insurers and regulators that the technology has genuine therapeutic value.',
    players:['RelieVRx / AppliedVR (FDA De Novo)','XRHealth (Medicare HCPCS E1905)','Limbix (FDA Breakthrough: adolescent depression)','Oxford VR','Psious'],
    connections:['② Knowledge','④ Facilitators','⑥ Economic','⑦ Regulatory'],
    challenge:'Insurance reimbursement is narrow — only RelieVRx and XRHealth have established pathways. Clinical continuity expectations make platform closures far more disruptive than consumer churn. Overclaiming outcomes risks burning credibility with the medical establishment at a moment when it\'s just beginning to take the field seriously.',
    opportunity:'Commercial insurers historically follow Medicare coverage within 3–7 years — XRHealth\'s E1905 code sets the precedent. Multiple FDA Breakthrough Device designations are in progress for anxiety, treatment-resistant depression, and addiction. Hospital VR programs are scaling from isolated pilots.',
    ripple:'⚡ FDA clearance for a VR therapy device immediately validates the field to insurers, attracts clinical investment, and signals to every other developer that the regulatory pathway is navigable.'
  },
  facilitators: {
    color:'#ec4899',
    title:'FACILITATORS & GUIDES',
    subtitle:'Wellness Practitioners · Transformational Guides · Retreat Leaders',
    role:'The field\'s primary human point of contact. Non-clinical facilitators manage preparation, presence, and integration across all three phases of a session — and are often the person who determines whether a user becomes a long-term practitioner or a one-time curiosity.',
    players:['Cyberdelic Nexus (certification pathway)','Cyberdelic Society (global events)','Multiversity','VRAR Association','Individual practitioners'],
    connections:['③ Clinical','⑤ Users','⑧ Educators'],
    challenge:'Legal scope is undefined — what non-licensed facilitators can offer varies by state and has no federal codification. Liability for adverse events is unresolved; most insurance is adapted from life coaching frameworks not stress-tested in cyberdelic contexts. No recognized credential exists yet.',
    opportunity:'Facilitators now engaging in professional association formation are literally writing the field\'s governance. Full-time income of $40,000–$100,000+ is achievable within 18–36 months. AI-assisted facilitation tools could expand reach well beyond what any individual can serve alone.',
    ripple:'⚡ As training matures and ethics standards crystallize, the facilitator pathway becomes legible to regulators and insurers — unlocking reimbursement and institutional access that currently requires a clinical license.'
  },
  users: {
    color:'#f59e0b',
    title:'USERS & COMMUNITIES',
    subtitle:'Personal Practitioners · Peer Networks · Early Adopters',
    role:'Generate real-world feedback and cultural momentum. Users are the foundation every other pathway builds on — their experiences validate platforms, sustain word-of-mouth, and produce the firsthand accounts that no researcher or developer claim can match in credibility.',
    players:['Cyberdelic Society (Europe, N. America, Australia)','Reddit r/cyberdelics','Discord peer networks','Cyberdelic Hackathon Berlin','Facilitator circles (4–8 person peer groups)'],
    connections:['④ Facilitators','② Knowledge','① Tech'],
    challenge:'The user base skews overwhelmingly affluent, educated, and tech-comfortable. First-year cost of $700–$1,300 excludes most of the world. Only ~15 million VR headsets are in active use globally. The geographic concentration in coastal US and European hubs limits research generalizability and cultural reach.',
    opportunity:'Users with genuine experiences are the field\'s most credible ambassadors — their first-person accounts carry authority no institutional claim can replicate. Community infrastructure for storytelling, peer mentorship, and public advocacy could multiply the field\'s cultural footprint at minimal institutional cost.',
    ripple:'⚡ User communities surface real-world effects — both positive and adverse — that researchers haven\'t yet studied, feeding directly back into the knowledge production and platform development cycles.'
  },
  economic: {
    color:'#f97316',
    title:'ECONOMIC INFRASTRUCTURE',
    subtitle:'Venture Capital · Angels · Grants · Business Models',
    role:'Determine which ideas get resources to develop. Every platform, research program, and training organization depends on some form of economic model to survive. The field\'s growth rate is ultimately set by whoever controls the capital allocation.',
    players:['SOSV / XRC Labs (VR accelerator)','NIH, NSF (grants)','Heffter & Fetzer Institutes','TRIPP ($11.2M Series A, 2022)','Calm ($2B) · Headspace ($3B) as precedent'],
    connections:['① Tech','② Knowledge','③ Clinical','⑦ Regulatory'],
    challenge:'Consumer subscription model is unproven at scale — TRIPP\'s closure (85,000 subscribers) showed that subscription-only revenue concentrates all survival risk in the most volatile model when hardware adoption lags. Regulatory uncertainty creates investor hesitancy that propagates to next-generation platforms.',
    opportunity:'Corporate wellness is the fastest near-term market: employers absorb hardware costs, ROI timelines are short, and group session economics outperform consumer subscription. XRHealth\'s Medicare milestone (HCPCS E1905) and RelieVRx\'s FDA authorization established the reimbursement precedent — each new milestone de-risks the category for the next platform.',
    ripple:'⚡ A single insurance reimbursement expansion unlocks a scalable revenue model that VC investment and clinical adoption rapidly follow — breaking the investor-hesitancy loop that has constrained the field\'s growth.'
  },
  regulatory: {
    color:'#10b981',
    title:'REGULATORY & KNOWLEDGE SHARING',
    subtitle:'FDA · EU MDR · Professional Associations · Journals · Conferences',
    role:'Enable safe practice and information flow. Without clear regulatory frameworks, clinical tools can\'t reach patients. Without knowledge-sharing infrastructure, validated insights stay siloed — slowing every other component.',
    players:['FDA (Class I/II/III, Breakthrough Designation)','EU MDR / UKCA / Health Canada','IVRHA','PLOS ONE, Frontiers in VR, PRESENCE','IEEE VR, MAPS, SAND, SIGGRAPH','ISO (VR safety standards, 3–5 yr process)'],
    connections:['① Tech','② Knowledge','③ Clinical','⑥ Economic'],
    challenge:'Device classification re-opens with every new capability — AI personalization and biofeedback loops may require fresh regulatory analysis. GDPR applies to EU citizens regardless of where a company is based, creating data localization costs most small teams can\'t absorb. Post-Brexit UK/EU divergence adds a parallel certification layer.',
    opportunity:'Professional associations developing voluntary standards now are building the demonstrated-responsibility track record that encourages regulators toward clear frameworks rather than restrictive ones. Each clear FDA pathway — like De Novo for RelieVRx — signals the next developer that the route is navigable.',
    ripple:'⚡ A single clear regulatory classification removes uncertainty for developers and investors simultaneously — one decision unblocks multiple ecosystem components at once.'
  },
  educators: {
    color:'#e879f9',
    title:'EDUCATORS & TRAINERS',
    subtitle:'Training Programs · Certification Bodies · Academic Curricula',
    role:'Translate research and clinical evidence into practitioner-ready skills. Without educators, the knowledge produced by researchers stays inaccessible to facilitators and clinicians — and the field can\'t scale safely beyond its first generation.',
    players:['Cyberdelic Nexus (40–100 hr certification)','Multiversity','VRAR Association','University programs (forming)','Online platforms'],
    connections:['④ Facilitators','③ Clinical','② Knowledge','⑤ Users'],
    challenge:'Training programs vary widely (40–100 hours, no standardization), no credential is recognized by insurance networks yet, and the field\'s first-generation practitioners — who built knowledge from scratch — risk aging out before systematic mentorship transfers it. Publication lag means curricula can lag 2–4 years behind the best current evidence.',
    opportunity:'Practitioner certification becoming an insurance-recognized credential is the single highest-leverage outcome for educators: it simultaneously elevates quality, expands facilitator income, and makes the field legible to healthcare systems. Medical schools are beginning to add VR therapeutics to curriculum as the evidence base becomes unignorable.',
    ripple:'⚡ Standardized training raises the quality floor for every facilitator and clinician — protecting users, building public credibility, and making the field readable to regulators and insurers who need to see consistent standards before they act.'
  }
};

const visited = new Set();
function showPanel(id) {
  const n = nodes[id];
  document.getElementById('panel-empty').style.display = 'none';
  const panel = document.getElementById('detail-panel');
  panel.style.display = 'block';
  panel.style.borderColor = n.color;

  const dot = document.getElementById('panel-dot');
  dot.style.background = n.color;
  dot.style.boxShadow = `0 0 6px ${n.color}`;

  document.getElementById('panel-title').style.color = n.color;
  document.getElementById('panel-title').textContent = n.title;
  document.getElementById('panel-subtitle').textContent = n.subtitle;
  document.getElementById('panel-role').textContent = n.role;
  document.getElementById('panel-challenge').textContent = n.challenge;
  document.getElementById('panel-opportunity').textContent = n.opportunity;
  document.getElementById('panel-ripple').innerHTML = `<span style="color:${n.color}">${n.ripple}</span>`;

  document.getElementById('panel-players').innerHTML = n.players.map(p =>
    `<span style="background:#1e293b;border:1px solid #334155;color:#94a3b8;padding:2px 6px;border-radius:4px;font-size:10px;">${p}</span>`
  ).join('');

  document.getElementById('panel-connections').innerHTML = n.connections.map(c =>
    `<span style="background:#1e293b;border:1px solid #334155;color:#94a3b8;padding:2px 6px;border-radius:4px;font-size:10px;">${c}</span>`
  ).join('');

  visited.add(id);
  document.getElementById('visited-badge').style.display = 'flex';
  const pct = (visited.size / 8) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${visited.size} / 8 visited`;
  if (visited.size === 8) {
    document.getElementById('progress-bar').style.background = '#34d399';
    document.getElementById('progress-label').style.color = '#34d399';
    document.getElementById('progress-label').textContent = '✓ All 8 visited — Continue unlocked';
  }
}
</script>
